name: Generate Snake Animation

on:
  # Berjalan otomatis setiap 24 jam
  schedule:
    - cron: "0 0 * * *"
  
  # Memungkinkan kamu menjalankan manual dari tab Actions
  workflow_dispatch:
  
  # Berjalan setiap kali kamu push ke branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # 1. Generate animasi snake berdasarkan kontribusi user
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # 2. Push file yang dihasilkan ke branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}